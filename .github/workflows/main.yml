name: Generate Datas
on:
  schedule:
    - cron: "0 */12 * * *" # Ajustado para rodar no minuto 0 de cada 12h
  workflow_dispatch:

permissions:
  contents: write # Essencial para salvar os arquivos no branch 'output'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3 # Recomendo usar a v3 (mais atual e estável)
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3 # Versão mais atualizada
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}